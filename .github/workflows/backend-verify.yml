name: Backend Verify

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      - name: Build
        run: cd backend && chmod +x build.sh && ./build.sh
      - name: Test
        run: cd backend && chmod +x test.sh && ./test.sh